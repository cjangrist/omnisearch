name = "omnisearch-mcp"
main = "src/worker.ts"
compatibility_date = "2026-06-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

[observability.traces]
enabled = true
destinations = ["grafana"]

[observability.logs]
enabled = true
destinations = ["grafana-logs"]

[[durable_objects.bindings]]
name = "OmnisearchMCP"
class_name = "OmnisearchMCP"

[[kv_namespaces]]
binding = "CACHE"
id = "d8b1130bed234c308a15316a5dfc15a8"

[[r2_buckets]]
binding = "TRACE_BUCKET"
bucket_name = "omnisearch"

[[routes]]
pattern = "omnisearch.angrist.net/*"
zone_name = "angrist.net"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OmnisearchMCP"]
